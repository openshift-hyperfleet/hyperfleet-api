# Default values for hyperfleet-adapter
# This is a YAML-formatted file.

# -- Adapter deployment configuration. Controls how the adapter-config
# ConfigMap is created. Use `adapterConfig.yaml` for inline YAML,
# `adapterConfig.files` for chart-packaged files, or set `create: false`
# and provide `configMapName` to reference an existing ConfigMap.
adapterConfig:
  # -- Create the adapter-config ConfigMap
  create: true
  # option1: ConfigMap name (if different from default, and set create: false)
  #configMapName: ""

  # option2: AdapterConfig YAML (creates adapter-config.yaml key in ConfigMap)
  # yaml:
  #  adapter:
  #    name: my-adapter
  #    version: "0.1.0"

  # option3: AdapterConfig YAML files packaged with the chart
  # files:
  # adapter-config.yaml: examples/kubernetes/adapter-config.yaml

  # -- HyperFleet API connection settings injected as environment variables
  hyperfleetApi:
    # -- API base URL (`HYPERFLEET_API_BASE_URL`)
    baseUrl: http://hyperfleet-api:8000
    # -- API version (`HYPERFLEET_API_VERSION`)
    version: v1
  # -- Log level for the adapter
  log:
    # -- Log level (`debug`, `info`, `warn`, `error`)
    level: info

# -- Adapter task configuration. Controls how the adapter-task-config
# ConfigMap is created. Supports inline YAML, chart-packaged files,
# or external content via `--set-file`.
adapterTaskConfig:
  # -- Create the adapter-task-config ConfigMap
  create: true
  # option1: ConfigMap name (if different from default, and set create: false)
  #configMapName: ""

  # option2: AdapterTaskConfig YAML (creates task-config.yaml key in ConfigMap)
  # Mutually exclusive with files and external
  # yaml:
  #   params: []
  #   resources: []

  # option3: AdapterTaskConfig YAML files packaged with the chart
  # Files are loaded from the chart directory via $.Files.Get
  # Can be combined with external for site-specific overrides
  # files:
  #   task-config.yaml: examples/kubernetes/adapter-task-config.yaml

  # option4: External content passed in (e.g., via --set-file)
  # Creates ConfigMap keys as <name>.yaml with the provided content
  # Can be combined with files (collision detection enforced)
  # external:
  #   myconfig: |
  #     params: []
  #     resources: []
  # Or use: --set-file adapterTaskConfig.external.myconfig=/path/to/config.yaml

# -- Affinity rules for pod scheduling
affinity: {}

# -- Container arguments passed to the adapter binary
# @default -- `["serve", "--config", "/etc/adapter/adapter-config.yaml", "--task-config", "/etc/adapter/task-config.yaml"]`
args:
  - serve
  - --config
  - /etc/adapter/adapter-config.yaml
  - --task-config
  - /etc/adapter/task-config.yaml

# -- Horizontal Pod Autoscaler configuration
autoscaling:
  # -- Enable the HPA
  enabled: false
  # -- Maximum number of replicas
  maxReplicas: 10
  # -- Minimum number of replicas
  minReplicas: 1
  # -- Target CPU utilization percentage
  targetCPUUtilizationPercentage: 80
  # -- Target memory utilization percentage
  targetMemoryUtilizationPercentage: 80

# -- Broker configuration for event consumption. Supports RabbitMQ and
# Google Pub/Sub. Use `broker.yaml` for inline config, or set `create: false`
# and provide `configMapName` to reference an existing ConfigMap.
broker:
  # -- Create the broker ConfigMap
  create: true
  # option1
  # configMapName: ""

  # option2
  # yaml: ""

  # -- Broker type (must be `googlepubsub` or `rabbitmq`)
  type: ""
  # -- Google Pub/Sub configuration
  googlepubsub:
    # -- GCP project ID
    projectId: ""
    # -- Pub/Sub topic name
    topic: ""
    # -- Subscription ID
    subscriptionId: ""
    # -- Dead letter topic name
    deadLetterTopic: ""
    # -- Auto-create topic if missing (use `false` in production)
    createTopicIfMissing: false
    # -- Auto-create subscription if missing (use `false` in production)
    createSubscriptionIfMissing: false
  # -- RabbitMQ configuration
  rabbitmq:
    # -- Connection URL
    url: ""
    # -- Queue name prefix (derived from topic+subscriptionId if omitted)
    queue: ""
    # -- Exchange name
    exchange: ""
    # -- Exchange type
    exchangeType: "topic"

# -- Container command override
command:
  - /app/adapter

# -- Container ports exposed by the adapter
# @default -- `[{containerPort: 8080, name: http}, {containerPort: 9090, name: metrics}]`
containerPorts:
  - containerPort: 8080
    name: http
    protocol: TCP
  - containerPort: 9090
    name: metrics
    protocol: TCP

# -- Additional environment variables injected into the adapter container
env: []
# - name: ADAPTER_CONFIG_PATH
#   value: /path/to/custom/config.yaml
# - name: MY_SECRET
#   valueFrom:
#     secretKeyRef:
#       name: my-secret
#       key: secret-key

# -- Extra volume mounts added to the adapter container
extraVolumeMounts: []
# - name: custom-config
#   mountPath: /etc/custom
#   readOnly: true

# -- Extra volumes added to the pod
extraVolumes: []
# - name: custom-config
#   configMap:
#     name: custom-configmap

# -- Override the full release name used in resource names
fullnameOverride: ""

image:
  # -- Image pull policy
  pullPolicy: Always
  # -- Container image registry (no default — must be set)
  registry: CHANGE_ME
  # -- Container image repository (no default — must be set)
  repository: CHANGE_ME
  # -- Image tag (no default — must be set via `--set image.tag=<version>`)
  tag: ""

# -- Secrets for pulling images from private registries
imagePullSecrets: []

# -- Init containers added to the pod
# @default -- `[]`
initContainers: []
# - name: init-myservice
#   image: busybox:1.28
#   command: ['sh', '-c', 'until nslookup myservice; do echo waiting; sleep 2; done']

# -- Lifecycle hooks for the adapter container
# @default -- `{}`
lifecycle: {}
# preStop:
#   exec:
#     command:
#       - /bin/sh
#       - -c
#       - sleep 10

# -- Liveness probe configuration (per HyperFleet health-endpoints standard)
livenessProbe:
  # -- Enable the liveness probe
  enabled: true
  httpGet:
    # -- Liveness probe path
    path: /healthz
    # -- Liveness probe port
    port: 8080

# -- Minimum seconds a pod must be ready before considered available
minReadySeconds: 0
# -- Override the chart name used in resource names
nameOverride: ""
# -- Node selector constraints for pod scheduling
nodeSelector: {}
# -- Additional annotations applied to all pods
podAnnotations: {}

# -- PodDisruptionBudget configuration
podDisruptionBudget:
  # -- Enable the PDB
  enabled: true
  # minAvailable: 1
  # -- Maximum number of pods that can be unavailable during disruption
  maxUnavailable: 1
  # unhealthyPodEvictionPolicy: IfHealthyBudget

# -- Additional labels applied to all pods
podLabels: {}

# -- Pod-level security context
podSecurityContext:
  # -- Filesystem group for volume mounts
  fsGroup: 65532
  # -- Run all containers as non-root
  runAsNonRoot: true
  # -- UID for all containers
  runAsUser: 65532

# -- PriorityClass name for pod scheduling
priorityClassName: ""

# -- RBAC configuration. Required when adapter tasks interact with the
# cluster (e.g. creating Jobs, updating status).
rbac:
  # -- Create RBAC resources (Role + RoleBinding)
  create: true
  # resources:
  #   - namespaces
  #   - serviceaccounts
  #   - configmaps
  #   - deployments
  #   - pods
  #   - roles
  #   - rolebindings
  #   - jobs
  #   - jobs/status
  # -- Additional custom RBAC rules appended to auto-generated rules
  rules: []

# -- Readiness probe configuration (per HyperFleet health-endpoints standard)
readinessProbe:
  # -- Enable the readiness probe
  enabled: true
  httpGet:
    # -- Readiness probe path
    path: /readyz
    # -- Readiness probe port
    port: 8080

# -- Number of adapter replicas
replicaCount: 1

# -- CPU and memory resource requests and limits
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# -- Number of old ReplicaSets to retain for rollback
revisionHistoryLimit: 10

# -- Container-level security context
securityContext:
  # -- Disallow privilege escalation
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  # -- Mount root filesystem as read-only
  readOnlyRootFilesystem: true
  seccompProfile:
    type: RuntimeDefault

# -- ServiceAccount configuration
serviceAccount:
  # -- Annotations added to the ServiceAccount (e.g. for Workload Identity)
  annotations: {}
  # -- Create a ServiceAccount for the adapter
  create: true
  # -- Override the ServiceAccount name (defaults to the release fullname)
  name: ""

# -- Sidecar containers added to the pod
# @default -- `[]`
sidecarContainers: []
# - name: sidecar
#   image: nginx:1.19
#   ports:
#     - containerPort: 80

# -- Startup probe configuration (useful for slow-starting containers)
startupProbe:
  # -- Enable the startup probe
  enabled: false
  httpGet:
    # -- Startup probe path
    path: /healthz
    # -- Startup probe port
    port: 8080

# -- Deployment update strategy
strategy:
  rollingUpdate:
    # -- Maximum number of pods above desired count during update
    maxSurge: 1
    # -- Maximum number of unavailable pods during update
    maxUnavailable: 0
  # -- Strategy type (`RollingUpdate` or `Recreate`)
  type: RollingUpdate

# -- Termination grace period in seconds
terminationGracePeriodSeconds: 30
# -- Tolerations for pod scheduling
tolerations: []

# -- ServiceMonitor for Prometheus Operator scrape configuration.
# Defaults to enabled. On clusters without Prometheus Operator CRDs,
# the resource is silently skipped.
serviceMonitor:
  # -- Create a ServiceMonitor resource
  enabled: true
  # -- Scrape interval
  interval: 30s
  # -- Scrape timeout (must be less than interval)
  scrapeTimeout: 10s
  # -- Additional labels for ServiceMonitor discovery
  labels: {}
  # -- Honor labels from the target to avoid overwriting
  honorLabels: true
  # -- Metric relabel configs applied before ingestion
  metricRelabeling: []
  # -- Namespace selector for cross-namespace monitoring
  namespaceSelector: {}
  # -- Override the namespace where ServiceMonitor is created (defaults to release namespace)
  namespace: ""

# -- Distributed tracing configuration (OpenTelemetry)
tracing:
  # -- Enable trace export
  enabled: false
  # -- Service name reported in traces
  serviceName: "hyperfleet-adapter"
  # -- OTLP exporter endpoint (traces go to stdout when empty)
  otlpEndpoint: ""
  # -- OTLP protocol (`grpc` or `http/protobuf`)
  otlpProtocol: "grpc"
  # -- Sampler type
  sampler: "parentbased_traceidratio"
  # -- Sampling rate (`1.0` for dev, `0.01` for production)
  samplerArg: "1.0"
  # -- Context propagation formats
  propagators: "tracecontext,baggage"
