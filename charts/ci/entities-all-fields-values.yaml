# Test values: entities with all optional fields populated.
# Used by make test-helm to validate configmap template rendering.
image:
  registry: quay.io
  repository: openshift-hyperfleet/hyperfleet-api
  tag: test

adapters:
  cluster: ["validation"]
  nodepool: ["validation"]

config:
  entities:
    - kind: Channel
      plural: channels
      spec_schema_name: ChannelSpec
      search_disallowed_fields: [spec]
    - kind: Version
      plural: versions
      parent_kind: Channel
      on_parent_delete: restrict
      spec_schema_name: VersionSpec
      search_disallowed_fields: [spec]
      required_adapters:
        - validation
      references:
        - ref_type: channel
          target_kind: Channel
          min: 1
          max: 1
    - kind: WifConfig
      plural: wifconfigs
      spec_schema_name: WifConfigSpec
      search_disallowed_fields: [spec]
