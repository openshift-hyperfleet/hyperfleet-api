# Test values: entities with all optional fields populated.
# Used by make test-helm to validate configmap template rendering.
image:
  registry: quay.io
  repository: openshift-hyperfleet/hyperfleet-api
  tag: test


config:
  entities:
    - kind: Cluster
      plural: clusters
      spec_schema_name: ClusterSpec
      required_adapters:
        - validation
        - dns
        - pullsecret
        - hypershift
      name_min_len: 3
      name_max_len: 53
      require_spec_schema: true
    - kind: NodePool
      plural: nodepools
      parent_kind: Cluster
      on_parent_delete: cascade
      spec_schema_name: NodePoolSpec
      required_adapters:
        - validation
        - hypershift
      name_min_len: 3
      name_max_len: 15
      require_spec_schema: true
    - kind: Channel
      plural: channels
      spec_schema_name: ChannelSpec
    - kind: Version
      plural: versions
      parent_kind: Channel
      on_parent_delete: restrict
      spec_schema_name: VersionSpec
      required_adapters:
        - validation
      references:
        - ref_type: channel
          target_kind: Channel
          min: 1
          max: 1
    - kind: WifConfig
      plural: wifconfigs
      spec_schema_name: WifConfigSpec
