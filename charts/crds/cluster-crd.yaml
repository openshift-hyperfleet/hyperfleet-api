apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: clusters.hyperfleet.io
  labels:
    app.kubernetes.io/name: hyperfleet-api
    app.kubernetes.io/part-of: hyperfleet
  annotations:
    hyperfleet.io/scope: "Root"
    hyperfleet.io/required-adapters: "validation,dns,pullsecret,hypershift"
    hyperfleet.io/enabled: "true"
spec:
  group: hyperfleet.io
  names:
    kind: Cluster
    listKind: ClusterList
    plural: clusters
    singular: cluster
    shortNames:
      - hfc
      - hfcluster
  scope: Cluster
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: Cluster is the Schema for HyperFleet managed clusters
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              description: ClusterSpec defines the desired state of a HyperFleet cluster
              required:
                - platform
              properties:
                platform:
                  type: object
                  description: Platform-specific configuration (e.g., AWS, GCP, Azure)
                  x-kubernetes-preserve-unknown-fields: true
                region:
                  type: string
                  description: Cloud region for the cluster
                network:
                  type: object
                  description: Network configuration
                  x-kubernetes-preserve-unknown-fields: true
                version:
                  type: string
                  description: Desired OpenShift/Kubernetes version
                release_image:
                  type: string
                  description: Release image for the cluster
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
          description: Whether the cluster is ready
        - name: Available
          type: string
          jsonPath: .status.conditions[?(@.type=="Available")].status
          description: Whether the cluster is available
        - name: Generation
          type: integer
          jsonPath: .metadata.generation
          description: The generation of this resource
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
          description: Time since creation
