apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: idps.hyperfleet.io
  labels:
    app.kubernetes.io/name: hyperfleet-api
    app.kubernetes.io/part-of: hyperfleet
  annotations:
    hyperfleet.io/scope: "Owned"
    hyperfleet.io/owner-kind: "Cluster"
    hyperfleet.io/owner-path-param: "cluster_id"
    hyperfleet.io/required-adapters: "validation"
    hyperfleet.io/enabled: "true"
spec:
  group: hyperfleet.io
  names:
    kind: IDP
    listKind: IDPList
    plural: idps
    singular: idp
    shortNames:
      - hfidp
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: IDP is the Schema for HyperFleet identity providers
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              description: IDPSpec defines the desired state of an IDP
              required:
                - clusterRef
                - type
              properties:
                clusterRef:
                  type: string
                  description: Reference to the parent Cluster resource
                type:
                  type: string
                  description: Type of identity provider (e.g., OIDC, LDAP, SAML)
                  enum:
                    - OIDC
                    - LDAP
                    - SAML
                    - GitHub
                    - GitLab
                    - Google
                    - Microsoft
                displayName:
                  type: string
                  description: Human-readable name for the identity provider
                config:
                  type: object
                  description: Provider-specific configuration
                  x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Cluster
          type: string
          jsonPath: .spec.clusterRef
          description: The parent cluster
        - name: Type
          type: string
          jsonPath: .spec.type
          description: The IDP type
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
          description: Whether the IDP is ready
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
          description: Time since creation
