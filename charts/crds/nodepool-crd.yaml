apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: nodepools.hyperfleet.io
  labels:
    app.kubernetes.io/name: hyperfleet-api
    app.kubernetes.io/part-of: hyperfleet
  annotations:
    hyperfleet.io/scope: "Owned"
    hyperfleet.io/owner-kind: "Cluster"
    hyperfleet.io/owner-path-param: "cluster_id"
    hyperfleet.io/required-adapters: "validation,hypershift"
    hyperfleet.io/enabled: "true"
spec:
  group: hyperfleet.io
  names:
    kind: NodePool
    listKind: NodePoolList
    plural: nodepools
    singular: nodepool
    shortNames:
      - hfnp
      - hfnodepool
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: NodePool is the Schema for HyperFleet node pools
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              description: NodePoolSpec defines the desired state of a NodePool
              required:
                - clusterRef
              properties:
                clusterRef:
                  type: string
                  description: Reference to the parent Cluster resource
                replicas:
                  type: integer
                  description: Desired number of nodes in the pool
                  minimum: 0
                instanceType:
                  type: string
                  description: Cloud provider instance type (e.g., m5.xlarge)
                autoScaling:
                  type: object
                  description: Auto-scaling configuration
                  x-kubernetes-preserve-unknown-fields: true
                platform:
                  type: object
                  description: Platform-specific node pool configuration
                  x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Cluster
          type: string
          jsonPath: .spec.clusterRef
          description: The parent cluster
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
          description: Whether the nodepool is ready
        - name: Available
          type: string
          jsonPath: .status.conditions[?(@.type=="Available")].status
          description: Whether the nodepool is available
        - name: Generation
          type: integer
          jsonPath: .metadata.generation
          description: The generation of this resource
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
          description: Time since creation
