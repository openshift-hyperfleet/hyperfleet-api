# Example HyperFleet Adapter task configuration — Two separate ManifestWorks
#
# This example demonstrates resource ordering via deletion dependencies.
# Two ManifestWorks are created independently:
#   1. configMapManifestWork  — manages the ConfigMap (mw-configmap-<clusterId>)
#   2. namespaceManifestWork  — manages the Namespace (mw-namespace-<clusterId>)
#
# Deletion order (cluster teardown):
#   1. configMapManifestWork is deleted first (when is_deleting)
#   2. namespaceManifestWork is deleted only once the ConfigMap ManifestWork is
#      confirmed gone (!resources.?configMapManifestWork.hasValue())
#
# This prevents the Namespace from being removed while the ConfigMap still exists
# inside it, avoiding in-flight resource conflicts during Maestro async cleanup.

params:
  - name: clusterId
    required: true
    source: event.id
    type: string
  - name: generationId
    required: true
    source: event.generation
    type: int

preconditions:
  - api_call:
      method: GET
      retry_attempts: 3
      retry_backoff: exponential
      timeout: 10s
      url: /clusters/{{ .clusterId }}
    capture:
      - field: name
        name: clusterName
      - field: generation
        name: generationId
      - field: created_time
        name: timestamp
      # is_deleting is the canonical deletion gate used throughout payload expressions.
      # Capturing it here avoids repeating "has(clusterStatus.deleted_time)" everywhere and
      # prevents false-positive Finalized=True when resources are absent for
      # unrelated reasons (e.g., first reconciliation before provisioning).
      - name: is_deleting
        expression: "has(clusterStatus.deleted_time)"
      - expression: |
          status.conditions.filter(c, c.type == "Ready").size() > 0
            ? status.conditions.filter(c, c.type == "Ready")[0].status
            : "False"
        name: readyConditionStatus
      - name: placementClusterName
        expression: '"cluster1"' # TBC coming from placement adapter
    conditions:
      - field: readyConditionStatus
        operator: equals
        value: "False"
    name: clusterStatus
  - expression: |
      readyConditionStatus == "False"
    name: validationCheck

resources:
  # ============================================================================
  # Resource 1: ConfigMap ManifestWork
  # Deleted first on teardown (when is_deleting).
  # ============================================================================
  - name: configMapManifestWork
    discovery:
      by_name: '{{ .clusterId }}-mw2-cm'
    manifest:
      ref: /etc/adapter/manifestwork-configmap.yaml
    nested_discoveries:
      - discovery:
          by_name: cluster-config
        name: mgmtConfigMap
    transport:
      client: maestro
      maestro:
        target_cluster: '{{ .placementClusterName }}'
    lifecycle:
      delete:
        # propagationPolicy is ignored for Maestro transport — ManifestWork's
        # spec.deleteOption.propagationPolicy governs sub-resource cleanup.
        propagationPolicy: Background
        when:
          expression: "is_deleting"

  # ============================================================================
  # Resource 2: Namespace ManifestWork
  # Deleted second on teardown — only after the ConfigMap ManifestWork is gone.
  # This ensures the namespace is not removed while the ConfigMap is still being
  # cleaned up inside it by Maestro.
  # ============================================================================
  - name: namespaceManifestWork
    discovery:
      by_name: '{{ .clusterId }}-mw2'
    manifest:
      ref: /etc/adapter/manifestwork-namespace.yaml
    nested_discoveries:
      - discovery:
          by_selectors:
            label_selector:
              hyperfleet.io/cluster-id: '{{ .clusterId }}'
              hyperfleet.io/resource-type: namespace
        name: mgmtNamespace
    transport:
      client: maestro
      maestro:
        target_cluster: '{{ .placementClusterName }}'
    lifecycle:
      delete:
        propagationPolicy: Background
        when:
          # Gate: only delete the Namespace once the ConfigMap ManifestWork is
          # confirmed absent. On each reconciliation, if configMapManifestWork
          # is still present this expression is false and deletion is skipped.
          expression: "is_deleting && !resources.?configMapManifestWork.hasValue()"

post:
  payloads:
    - build:
        adapter: '{{ .adapter.name }}'
        conditions:
          # Applied: Both ManifestWorks must have been applied by Maestro.
          - type: Applied
            message:
              expression: |
                !(has(resources.configMapManifestWork) && has(resources.configMapManifestWork.status) && has(resources.configMapManifestWork.status.conditions)
                  && resources.configMapManifestWork.status.conditions.exists(c, has(c.type) && c.type == "Applied" && has(c.status)))
                ? "ConfigMap ManifestWork not discovered from Maestro or no Applied condition"
                : !(has(resources.namespaceManifestWork) && has(resources.namespaceManifestWork.status) && has(resources.namespaceManifestWork.status.conditions)
                  && resources.namespaceManifestWork.status.conditions.exists(c, has(c.type) && c.type == "Applied" && has(c.status)))
                  ? "Namespace ManifestWork not discovered from Maestro or no Applied condition"
                  : "Both ManifestWorks applied by Maestro"
            reason:
              expression: |
                !(has(resources.configMapManifestWork) && has(resources.configMapManifestWork.status) && has(resources.configMapManifestWork.status.conditions)
                  && resources.configMapManifestWork.status.conditions.exists(c, has(c.type) && c.type == "Applied" && has(c.status)))
                ? "ConfigMapManifestWorkNotApplied"
                : !(has(resources.namespaceManifestWork) && has(resources.namespaceManifestWork.status) && has(resources.namespaceManifestWork.status.conditions)
                  && resources.namespaceManifestWork.status.conditions.exists(c, has(c.type) && c.type == "Applied" && has(c.status)))
                  ? "NamespaceManifestWorkNotApplied"
                  : "BothManifestWorksApplied"
            status:
              expression: |
                has(resources.configMapManifestWork) && has(resources.configMapManifestWork.status) && has(resources.configMapManifestWork.status.conditions)
                  && resources.configMapManifestWork.status.conditions.exists(c, has(c.type) && c.type == "Applied" && has(c.status) && c.status == "True")
                  && has(resources.namespaceManifestWork) && has(resources.namespaceManifestWork.status) && has(resources.namespaceManifestWork.status.conditions)
                  && resources.namespaceManifestWork.status.conditions.exists(c, has(c.type) && c.type == "Applied" && has(c.status) && c.status == "True")
                ? "True"
                : "False"

          # Available: Both nested resources must be available on the spoke cluster.
          - type: Available
            message:
              expression: |
                !(has(resources.mgmtNamespace) && has(resources.mgmtNamespace.conditions))
                ? "Namespace not discovered from ManifestWork"
                : !resources.mgmtNamespace.conditions.exists(c, has(c.type) && c.type == "Available" && has(c.status) && c.status == "True")
                  ? "Namespace not yet available on spoke cluster"
                  : !(has(resources.mgmtConfigMap) && has(resources.mgmtConfigMap.conditions))
                    ? "ConfigMap not discovered from ManifestWork"
                    : !resources.mgmtConfigMap.conditions.exists(c, c.type == "Available" && has(c.status) && c.status == "True")
                      ? "ConfigMap not yet available on spoke cluster"
                      : "All resources (namespace, configmap) are available on spoke cluster"
            reason:
              expression: |
                !(has(resources.mgmtNamespace) && has(resources.mgmtNamespace.conditions))
                ? "NamespaceNotDiscovered"
                : !resources.mgmtNamespace.conditions.exists(c, has(c.type) && c.type == "Available" && has(c.status) && c.status == "True")
                  ? "NamespaceNotAvailable"
                  : !(has(resources.mgmtConfigMap) && has(resources.mgmtConfigMap.conditions))
                    ? "ConfigMapNotDiscovered"
                    : !resources.mgmtConfigMap.conditions.exists(c, c.type == "Available" && has(c.status) && c.status == "True")
                      ? "ConfigMapNotAvailable"
                      : "AllResourcesAvailable"
            status:
              expression: |
                has(resources.mgmtNamespace) && has(resources.mgmtNamespace.conditions)
                  && resources.mgmtNamespace.conditions.exists(c, has(c.type) && c.type == "Available" && has(c.status) && c.status == "True")
                  && has(resources.mgmtConfigMap) && has(resources.mgmtConfigMap.conditions)
                  && resources.mgmtConfigMap.conditions.exists(c, c.type == "Available" && has(c.status) && c.status == "True")
                ? "True"
                : "False"

          # Health: Adapter execution status (runtime).
          - type: Health
            message:
              expression: |
                adapter.?executionStatus.orValue("") != "success"
                ? "Adapter failed at phase ["
                    + adapter.?executionError.?phase.orValue("unknown")
                    + "] step ["
                    + adapter.?executionError.?step.orValue("unknown")
                    + "]: "
                    + adapter.?executionError.?message.orValue(adapter.?errorMessage.orValue("no details"))
                : adapter.?resourcesSkipped.orValue(false)
                  ? "Resources skipped: " + adapter.?skipReason.orValue("unknown reason")
                  : "Adapter execution completed successfully"
            reason:
              expression: |
                adapter.?executionStatus.orValue("") != "success"
                ? "ExecutionFailed:" + adapter.?executionError.?phase.orValue("unknown")
                : adapter.?resourcesSkipped.orValue(false)
                  ? "ResourcesSkipped"
                  : "Healthy"
            status:
              expression: |
                adapter.?executionStatus.orValue("") == "success"
                  && !adapter.?resourcesSkipped.orValue(false)
                ? "True"
                : "False"

          # Finalized: True once both ManifestWorks are confirmed deleted.
          # Triggers the API hard-delete for the cluster resource.
          #
          # Three-part guard (per design decision matrix):
          #   1. is_deleting     — only report True when deletion is actually pending
          #   2. executionStatus — prevents false True when executor failed mid-run
          #   3. Both gone       — cleanup confirmed by Maestro for both resources
          - type: Finalized
            status:
              expression: |
                is_deleting
                  && adapter.?executionStatus.orValue("") == "success"
                  && !adapter.?resourcesSkipped.orValue(false)
                  && !resources.?configMapManifestWork.hasValue()
                  && !resources.?namespaceManifestWork.hasValue()
                ? "True"
                : "False"
            reason:
              expression: |
                !is_deleting
                ? ""
                : adapter.?executionStatus.orValue("") != "success"
                  ? "AdapterUnhealthy"
                  : resources.?configMapManifestWork.hasValue()
                    ? "WaitingForConfigMapDeletion"
                    : resources.?namespaceManifestWork.hasValue()
                      ? "WaitingForNamespaceDeletion"
                      : "CleanupConfirmed"
            message:
              expression: |
                !is_deleting
                ? ""
                : adapter.?executionStatus.orValue("") != "success"
                  ? "Cannot confirm cleanup while adapter is unhealthy"
                  : resources.?configMapManifestWork.hasValue()
                    ? "Waiting for Maestro to delete ConfigMap ManifestWork"
                    : resources.?namespaceManifestWork.hasValue()
                      ? "ConfigMap ManifestWork deleted; waiting for Namespace ManifestWork deletion"
                      : "Both ManifestWorks deleted; Maestro cleanup confirmed"

        data:
          configmap:
            name:
              expression: |
                has(resources.mgmtConfigMap) && has(resources.mgmtConfigMap.metadata)
                ? resources.mgmtConfigMap.metadata.name
                : ""
          manifestwork:
            configmap:
              consumer:
                expression: |
                  has(resources.configMapManifestWork) && has(resources.configMapManifestWork.metadata)
                  ? resources.configMapManifestWork.metadata.namespace
                  : placementClusterName
              name:
                expression: |
                  has(resources.configMapManifestWork) && has(resources.configMapManifestWork.metadata)
                  ? resources.configMapManifestWork.metadata.name
                  : ""
            namespace:
              consumer:
                expression: |
                  has(resources.namespaceManifestWork) && has(resources.namespaceManifestWork.metadata)
                  ? resources.namespaceManifestWork.metadata.namespace
                  : placementClusterName
              name:
                expression: |
                  has(resources.namespaceManifestWork) && has(resources.namespaceManifestWork.metadata)
                  ? resources.namespaceManifestWork.metadata.name
                  : ""
          namespace:
            name:
              expression: |
                has(resources.mgmtNamespace) && has(resources.mgmtNamespace.metadata)
                ? resources.mgmtNamespace.metadata.name
                : ""
            phase:
              expression: |
                has(resources.mgmtNamespace) && has(resources.mgmtNamespace.statusFeedback) && has(resources.mgmtNamespace.statusFeedback.values)
                  && resources.mgmtNamespace.statusFeedback.values.exists(v, has(v.name) && v.name == "phase" && has(v.fieldValue))
                ? resources.mgmtNamespace.statusFeedback.values.filter(v, v.name == "phase")[0].fieldValue.string
                : "Unknown"

        # Use CEL expression for numeric fields to preserve type
        observed_generation:
          expression: generationId
        # Use Go template with now and date functions for timestamps
        observed_time: '{{ now | date "2006-01-02T15:04:05Z07:00" }}'
      name: clusterStatusPayload

  post_actions:
    - api_call:
        body: '{{ .clusterStatusPayload }}'
        headers:
          - name: Content-Type
            value: application/json
        method: POST
        url: /clusters/{{ .clusterId }}/statuses
      name: reportClusterStatus
