{{- include "hyperfleet-api.validateValues" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hyperfleet-api.fullname" . }}
  labels:
    {{- include "hyperfleet-api.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "hyperfleet-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Force pod restart when ConfigMap changes
        {{- if .Values.config.existingConfigMap }}
        # Checksum of external ConfigMap (via lookup)
        checksum/config: {{ (lookup "v1" "ConfigMap" .Release.Namespace .Values.config.existingConfigMap).data | toYaml | sha256sum }}
        {{- else }}
        # Checksum of generated ConfigMap
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "hyperfleet-api.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "hyperfleet-api.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if or .Values.database.postgresql.enabled .Values.database.external.enabled }}
      initContainers:
      {{- if .Values.database.postgresql.enabled }}
      - name: wait-for-db
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z {{ include "hyperfleet-api.fullname" . }}-postgresql {{ .Values.database.postgresql.port }}; do echo waiting for postgresql; sleep 2; done']
      {{- end }}
      - name: db-migrate
        image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["/app/hyperfleet-api", "migrate"]
        env:
        # Config file from ConfigMap
        - name: HYPERFLEET_CONFIG
          value: /etc/hyperfleet/config.yaml
        # Database credentials from Secret (using secretKeyRef)
        {{- include "hyperfleet-api.databaseEnvVars" . | nindent 8 }}
        volumeMounts:
        - name: config
          mountPath: /etc/hyperfleet
          readOnly: true
      {{- end }}
      containers:
      - name: {{ .Chart.Name }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        workingDir: /app
        # Simple command - configuration via ConfigMap and environment variables
        args:
        - serve
        ports:
        - name: http
          containerPort: {{ .Values.ports.api | default 8000 }}
          protocol: TCP
        - name: health
          containerPort: {{ .Values.ports.health | default 8080 }}
          protocol: TCP
        - name: metrics
          containerPort: {{ .Values.ports.metrics | default 9090 }}
          protocol: TCP
        env:
        # Config file from ConfigMap (generated from values)
        - name: HYPERFLEET_CONFIG
          value: /etc/hyperfleet/config.yaml

        # Database credentials from Secret (using secretKeyRef)
        {{- include "hyperfleet-api.databaseEnvVars" . | nindent 8 }}

        # Extra environment variables (escape hatch for overrides)
        {{- with .Values.extraEnv }}
        {{- toYaml . | nindent 8 }}
        {{- end }}

        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        volumeMounts:
        # ConfigMap mount - generated from values or existingConfigMap
        - name: config
          mountPath: /etc/hyperfleet
          readOnly: true

        # Temp directory for writable filesystem
        - name: tmp
          mountPath: /tmp

        {{- with .Values.extraVolumeMounts }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- if .Values.database.pgbouncer.enabled }}
      - name: pgbouncer
        image: {{ .Values.database.pgbouncer.image }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        ports:
        - name: pgbouncer
          containerPort: {{ .Values.database.pgbouncer.port }}
          protocol: TCP
        env:
        - name: POSTGRESQL_HOST
          value: {{ include "hyperfleet-api.fullname" . }}-postgresql
        - name: POSTGRESQL_PORT
          value: {{ .Values.database.postgresql.port | quote }}
        - name: POSTGRESQL_DATABASE
          value: {{ .Values.database.postgresql.database }}
        - name: POSTGRESQL_USERNAME
          value: {{ .Values.database.postgresql.user }}
        - name: POSTGRESQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "hyperfleet-api.fullname" . }}-db-secrets
              key: db.password
        - name: PGBOUNCER_PORT
          value: {{ .Values.database.pgbouncer.port | quote }}
        - name: PGBOUNCER_POOL_MODE
          value: {{ .Values.database.pgbouncer.poolMode }}
        - name: PGBOUNCER_DEFAULT_POOL_SIZE
          value: {{ .Values.database.pgbouncer.defaultPoolSize | quote }}
        - name: PGBOUNCER_MAX_CLIENT_CONN
          value: {{ .Values.database.pgbouncer.maxClientConn | quote }}
        - name: PGBOUNCER_MIN_POOL_SIZE
          value: {{ .Values.database.pgbouncer.minPoolSize | quote }}
        - name: PGBOUNCER_SERVER_IDLE_TIMEOUT
          value: {{ .Values.database.pgbouncer.serverIdleTimeout | quote }}
        - name: PGBOUNCER_SERVER_LIFETIME
          value: {{ .Values.database.pgbouncer.serverLifetime | quote }}
        - name: PGBOUNCER_DATABASE
          value: {{ .Values.database.postgresql.database }}
        - name: PGBOUNCER_IGNORE_STARTUP_PARAMETERS
          value: extra_float_digits
        readinessProbe:
          tcpSocket:
            port: pgbouncer
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          tcpSocket:
            port: pgbouncer
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          {{- toYaml .Values.database.pgbouncer.resources | nindent 10 }}
        volumeMounts:
        - name: pgbouncer-tmp
          mountPath: /tmp
        - name: pgbouncer-conf
          mountPath: /opt/bitnami/pgbouncer/conf
        - name: pgbouncer-logs
          mountPath: /opt/bitnami/pgbouncer/logs
        - name: pgbouncer-pid
          mountPath: /opt/bitnami/pgbouncer/tmp
      {{- end }}
      volumes:
      # ConfigMap volume - use existing or generated from values
      - name: config
        configMap:
          {{- if .Values.config.existingConfigMap }}
          name: {{ .Values.config.existingConfigMap }}
          {{- else }}
          name: {{ include "hyperfleet-api.fullname" . }}-config
          {{- end }}

      - name: tmp
        emptyDir: {}

      {{- if .Values.database.pgbouncer.enabled }}
      - name: pgbouncer-tmp
        emptyDir:
          sizeLimit: 100Mi
      - name: pgbouncer-conf
        emptyDir:
          sizeLimit: 10Mi
      - name: pgbouncer-logs
        emptyDir:
          sizeLimit: 100Mi
      - name: pgbouncer-pid
        emptyDir:
          sizeLimit: 1Mi
      {{- end }}

      {{- with .Values.extraVolumes }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
