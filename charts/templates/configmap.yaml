{{- if not .Values.config.existingConfigMap }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "hyperfleet-api.fullname" . }}-config
  labels:
    {{- include "hyperfleet-api.labels" . | nindent 4 }}
data:
  config.yaml: |
    # HyperFleet API Configuration
    # Generated from Helm values.yaml

    server:
      hostname: {{ .Values.config.server.hostname | quote }}
      host: {{ .Values.config.server.host | default "0.0.0.0" | quote }}
      port: {{ .Values.config.server.port | default 8000 }}
      openapi_schema_path: {{ ternary "/etc/hyperfleet/validation-schema/openapi.yaml" "openapi/openapi.yaml" .Values.validationSchema.enabled }}

      timeouts:
        read: {{ .Values.config.server.timeouts.read }}
        write: {{ .Values.config.server.timeouts.write }}

      tls:
        enabled: {{ .Values.config.server.tls.enabled }}
        cert_file: {{ .Values.config.server.tls.cert_file | quote }}
        key_file: {{ .Values.config.server.tls.key_file | quote }}

      jwt:
        enabled: {{ .Values.config.server.jwt.enabled }}
        {{- if .Values.config.server.jwt.configs }}
        configs:
          {{- range .Values.config.server.jwt.configs }}
          - issuer_url: {{ .issuer_url | quote }}
            {{- if .jwk_cert_url }}
            jwk_cert_url: {{ .jwk_cert_url | quote }}
            {{- end }}
            {{- if .jwk_cert_file }}
            jwk_cert_file: {{ .jwk_cert_file | quote }}
            {{- end }}
            {{- if .jwk_cert_ca_file }}
            jwk_cert_ca_file: {{ .jwk_cert_ca_file | quote }}
            {{- end }}
            {{- if .header }}
            header: {{ .header | quote }}
            {{- end }}
            {{- if .audience }}
            audience: {{ .audience | quote }}
            {{- end }}
            {{- if .identity_claim }}
            identity_claim: {{ .identity_claim | quote }}
            {{- end }}
            {{- if .identity_claim_pattern }}
            identity_claim_pattern: {{ .identity_claim_pattern | quote }}
            {{- end }}
            {{- if .identity_header }}
            identity_header: {{ .identity_header | quote }}
            {{- end }}
          {{- end }}
        {{- end }}

    database:
      dialect: {{ .Values.config.database.dialect }}

      # ============================================================
      # Database Connection (Provided by Secret in Kubernetes)
      # ============================================================
      # The following connection values are placeholders for documentation.
      # In Kubernetes deployments, actual credentials come from Secret
      # via secretKeyRef environment variables (HYPERFLEET_DATABASE_*).
      #
      # For custom ConfigMap users: update these values as needed.
      # ============================================================
      {{- if .Values.database.postgresql.enabled }}
      host: {{ include "hyperfleet-api.fullname" . }}-postgresql
      {{- else if .Values.config.database.host }}
      host: {{ .Values.config.database.host }}
      {{- else }}
      host: localhost
      {{- end }}
      port: {{ .Values.config.database.port }}
      name: {{ .Values.config.database.name }}
      # username/password: Not included in ConfigMap for security.
      #   This Helm chart injects credentials via secretKeyRef (Kubernetes best practice).
      #   The application also supports direct env vars, *_FILE env vars, or config file values.
      #   See deployment.md for Kubernetes setup or docs/config.md for all configuration options.

      # Application behavior settings
      debug: {{ .Values.config.database.debug }}

      ssl:
        mode: {{ .Values.config.database.ssl.mode }}
        root_cert_file: {{ .Values.config.database.ssl.root_cert_file | quote }}

      pool:
        max_connections: {{ .Values.config.database.pool.max_connections }}
        max_idle_connections: {{ .Values.config.database.pool.max_idle_connections }}
        conn_max_lifetime: {{ .Values.config.database.pool.conn_max_lifetime }}
        conn_max_idle_time: {{ .Values.config.database.pool.conn_max_idle_time }}
        request_timeout: {{ .Values.config.database.pool.request_timeout }}
        conn_retry_attempts: {{ .Values.config.database.pool.conn_retry_attempts }}
        conn_retry_interval: {{ .Values.config.database.pool.conn_retry_interval }}

    logging:
      level: {{ .Values.config.logging.level }}
      format: {{ .Values.config.logging.format }}
      output: {{ .Values.config.logging.output }}

      otel:
        enabled: {{ .Values.config.logging.otel.enabled }}

      masking:
        enabled: {{ .Values.config.logging.masking.enabled }}
        headers:
{{- range .Values.config.logging.masking.headers }}
          - {{ . }}
{{- end }}
        fields:
{{- range .Values.config.logging.masking.fields }}
          - {{ . }}
{{- end }}

    metrics:
      host: {{ .Values.config.metrics.host | default "0.0.0.0" }}
      port: {{ .Values.config.metrics.port | default 9090 }}

      tls:
        enabled: {{ .Values.config.metrics.tls.enabled }}

      label_metrics_inclusion_duration: {{ .Values.config.metrics.label_metrics_inclusion_duration }}

    health:
      host: {{ .Values.config.health.host | default "0.0.0.0" }}
      port: {{ .Values.config.health.port | default 8080 }}

      tls:
        enabled: {{ .Values.config.health.tls.enabled }}

      shutdown_timeout: {{ .Values.config.health.shutdown_timeout }}
      db_ping_timeout: {{ .Values.config.health.db_ping_timeout }}
    # NOTE: When EntityDescriptor gains many more fields, consider replacing
    # the explicit range below with: .Values.config.entities | toYaml | indent 6
{{- if .Values.config.entities }}
    entities:
{{- range .Values.config.entities }}
      - kind: {{ .kind }}
        plural: {{ .plural }}
{{- if .parent_kind }}
        parent_kind: {{ .parent_kind }}
{{- end }}
{{- if .on_parent_delete }}
        on_parent_delete: {{ .on_parent_delete }}
{{- end }}
        spec_schema_name: {{ .spec_schema_name }}
{{- if .required_adapters }}
        required_adapters:
{{- range .required_adapters }}
          - {{ . }}
{{- end }}
{{- end }}
{{- if .name_min_len }}
        name_min_len: {{ .name_min_len }}
{{- end }}
{{- if .name_max_len }}
        name_max_len: {{ .name_max_len }}
{{- end }}
{{- if .require_spec_schema }}
        require_spec_schema: {{ .require_spec_schema }}
{{- end }}
{{- if .references }}
        references:
{{- range .references }}
          - ref_type: {{ .ref_type }}
            target_kind: {{ .target_kind }}
{{- if .min }}
            min: {{ .min }}
{{- end }}
{{- if .max }}
            max: {{ .max }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- else }}
    entities: []
{{- end }}
{{- end }}
