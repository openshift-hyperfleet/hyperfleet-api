{{- if .Values.monitoring.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "hyperfleet-api.fullname" . }}
  {{- if .Values.monitoring.prometheusRule.namespace }}
  namespace: {{ .Values.monitoring.prometheusRule.namespace }}
  {{- else }}
  namespace: {{ .Release.Namespace }}
  {{- end }}
  labels:
    {{- include "hyperfleet-api.labels" . | nindent 4 }}
    {{- with .Values.monitoring.prometheusRule.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: hyperfleet-api-reconciliation
      rules:
        - alert: HyperFleetResourceReconciliationStuckWarning
          expr: max by (namespace, resource_type, is_delete)(hyperfleet_api_resource_pending_reconciliation_stuck) > 0
          for: {{ .Values.monitoring.prometheusRule.rules.reconciliationStuck.for | default "5m" }}
          labels:
            severity: warning
          annotations:
            summary: "HyperFleet resources stuck pending reconciliation"
            description: >-
              {{ "{{ $value }}" }} {{ "{{ $labels.resource_type }}" }} resource(s) (is_delete={{ "{{ $labels.is_delete }}" }}) have been
              pending reconciliation for more than {{ .Values.config.metrics.reconciliation_stuck_threshold | default "10m" }}
              (stuck threshold) + {{ .Values.monitoring.prometheusRule.rules.reconciliationStuck.for | default "5m" }} (alert delay).
            runbook_url: {{ .Values.monitoring.prometheusRule.rules.reconciliationStuck.runbookUrl | default "" | quote }}
        - alert: HyperFleetResourceReconciliationStuckCritical
          expr: max by (namespace, resource_type, is_delete)(hyperfleet_api_resource_pending_reconciliation_stuck_duration_seconds) > {{ .Values.monitoring.prometheusRule.rules.reconciliationTimeout.durationSeconds | default 1800 }}
          for: {{ .Values.monitoring.prometheusRule.rules.reconciliationTimeout.for | default "5m" }}
          labels:
            severity: critical
          annotations:
            summary: "HyperFleet resources timed out pending reconciliation"
            description: >-
              {{ "{{ $labels.resource_type }}" }} resource(s) (is_delete={{ "{{ $labels.is_delete }}" }}) stuck for {{ "{{ $value | humanizeDuration }}" }},
              exceeding the {{ .Values.monitoring.prometheusRule.rules.reconciliationTimeout.durationSeconds | default 1800 }}s timeout. Immediate investigation required.
            runbook_url: {{ .Values.monitoring.prometheusRule.rules.reconciliationTimeout.runbookUrl | default "" | quote }}
{{- end }}
