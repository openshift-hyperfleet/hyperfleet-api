# CEL Expression Showcase — Task Configuration for Dry-Run Testing
#
# This file demonstrates ALL available CEL expression patterns supported by the
# adapter framework. Each capture and payload field is annotated with the pattern
# it showcases. Use this with the cel-showcase discovery and api-responses files.
#
# CEL patterns demonstrated:
#   1.  field:          — simple dot-notation extraction
#   2.  filter()        — list filtering with ternary fallback
#   3.  exists()        — boolean existence check on list elements
#   4.  size()          — counting elements
#   5.  string concat   — building derived values with "+"
#   6.  type coercion   — string(), int() conversions
#   7.  in operator     — membership check
#   8.  map()           — list transformation
#   9.  has() + ternary — existence check with fallback
#  10.  ?.orValue()     — optional chaining with safe navigation
#  11.  filter() on conditions — extracting condition status
#  12.  dig()           — safe deep traversal (new helper)
#  13.  toJson()        — JSON serialization (new helper)
#  14.  adapter.?       — adapter execution metadata access
#  15.  Go templates    — template rendering with {{ }}
#  16.  distinct()      — deduplicate list elements (ext.Lists)
#  17.  sort()          — sort list elements (ext.Lists)
#  18.  slice()         — extract a sub-list by index range (ext.Lists)
#  19.  flatten()       — collapse nested lists into one (ext.Lists)
#  20.  sortBy()        — sort objects by a derived key (ext.Lists)

params:
  - name: "clusterId"
    source: "event.id"
    type: "string"
    required: true

  - name: "clusterKind"
    source: "event.kind"
    type: "string"
    default: "Cluster"

  - name: "generation"
    source: "event.generation"
    type: "int"
    required: true

  - name: "region"
    source: "env.REGION"
    type: "string"
    default: "us-east-1"

  - name: "adapterName"
    source: "env.ADAPTER_NAME"
    type: "string"
    default: "dry-run-adapter"

  - name: "fetchCluster"
    source:
      api_call:
        method: "GET"
        url: "/api/hyperfleet/v1/clusters/{{ .clusterId }}"
        timeout: 10s

  # ---------------------------------------------------------------
  # Pattern 1: field — simple dot-notation extraction
  # ---------------------------------------------------------------
  - name: "clusterName"
    source: "fetchCluster.name"

  # ---------------------------------------------------------------
  # Pattern 1b: field — nested dot-notation extraction
  # ---------------------------------------------------------------
  - name: "clusterRegion"
    source: "fetchCluster.spec.region"

  # ---------------------------------------------------------------
  # Pattern 2: filter() + ternary — list filtering with fallback
  # ---------------------------------------------------------------
  - name: "clusterStatus"
    source:
      expression: |
        fetchCluster.status.conditions.filter(c, c.type == "Reconciled").size() > 0
          ? fetchCluster.status.conditions.filter(c, c.type == "Reconciled")[0].status
          : "Unknown"

  # ---------------------------------------------------------------
  # Pattern 3: exists() — boolean check on list elements
  # ---------------------------------------------------------------
  - name: "isProduction"
    source:
      expression: |
        fetchCluster.spec.tags.exists(t, t == "production")

  # ---------------------------------------------------------------
  # Pattern 4: size() — counting elements
  # ---------------------------------------------------------------
  - name: "nodePoolCount"
    source:
      expression: |
        fetchCluster.spec.node_pools.size()

  # ---------------------------------------------------------------
  # Pattern 5: string concatenation — building derived values
  # ---------------------------------------------------------------
  - name: "resourcePrefix"
    source:
      expression: |
        fetchCluster.spec.provider + "-" + fetchCluster.spec.region + "-" + fetchCluster.name

  # ---------------------------------------------------------------
  # Pattern 6: type coercion — string() and int()
  # ---------------------------------------------------------------
  - name: "computeNodesStr"
    source:
      expression: |
        "compute=" + string(fetchCluster.nodes.compute)

  # ---------------------------------------------------------------
  # Pattern 7: in operator — membership check
  # ---------------------------------------------------------------
  - name: "isSupportedProvider"
    source:
      expression: |
        fetchCluster.spec.provider in ["aws", "gcp", "azure"]

  # ---------------------------------------------------------------
  # Pattern 8: map() — list transformation
  # ---------------------------------------------------------------
  - name: "nodePoolNames"
    source:
      expression: |
        fetchCluster.spec.node_pools.map(p, p.name)

  # ---------------------------------------------------------------
  # Pattern 4b: size() — counting with field extraction
  # ---------------------------------------------------------------
  - name: "computeNodes"
    source: "fetchCluster.nodes.compute"

  # Static timestamp for dry-run reproducibility
  - name: "timestamp"
    source:
      expression: '"2006-01-02T15:04:05Z07:00"'

  # ---------------------------------------------------------------
  # Pattern 16: distinct() — deduplicate list elements
  # ---------------------------------------------------------------
  - name: "uniqueTags"
    source:
      expression: |
        fetchCluster.spec.tags.distinct()

  # ---------------------------------------------------------------
  # Pattern 17: sort() — sort list elements alphabetically
  # ---------------------------------------------------------------
  - name: "sortedTags"
    source:
      expression: |
        fetchCluster.spec.tags.distinct().sort()

  # ---------------------------------------------------------------
  # Pattern 18: slice() — extract a sub-list by index range
  # ---------------------------------------------------------------
  - name: "firstNodePoolName"
    source:
      expression: |
        fetchCluster.spec.node_pools.map(p, p.name).slice(0, 1)

  # ---------------------------------------------------------------
  # Pattern 19: flatten() — collapse nested lists into one
  # ---------------------------------------------------------------
  - name: "conditionSummary"
    source:
      expression: |
        fetchCluster.status.conditions.map(c, [c.type, c.status]).flatten()

  # ---------------------------------------------------------------
  # Pattern 20: sortBy() — sort objects by a derived key
  # ---------------------------------------------------------------
  - name: "nodePoolsByReplicas"
    source:
      expression: |
        fetchCluster.spec.node_pools.sortBy(p, p.replicas).map(p, p.name)

  # ---------------------------------------------------------------
  # Pattern 21: conditionStatus() — capture conditions list for
  # use with domain-specific helpers in the payload phase.
  # ---------------------------------------------------------------
  - name: "conditions"
    source:
      expression: |
        fetchCluster.status.conditions

# ===========================================================================
# Preconditions
# ===========================================================================
preconditions:
  - name: "fetchCluster"
    conditions:
      - field: "clusterStatus"
        operator: "notEquals"
        value: "True"

# ===========================================================================
# Resources — Kubernetes manifests to apply
# ===========================================================================
resources:
  # Resource 0: Namespace
  - name: "namespace0"
    transport:
      client: kubernetes
    manifest:
      apiVersion: v1
      kind: Namespace
      metadata:
        # Pattern 15: Go template rendering
        name: "{{ .clusterId | lower }}"
        labels:
          hyperfleet.io/cluster-id: "{{ .clusterId }}"
          hyperfleet.io/managed-by: "{{ .adapterName }}"
          hyperfleet.io/resource-type: "namespace"
        annotations:
          hyperfleet.io/created-by: "hyperfleet-adapter"
          hyperfleet.io/generation: "{{ .generation }}"
    discovery:
      by_name: "{{ .clusterId | lower }}"

  # Resource 1: ConfigMap — cluster configuration
  - name: "configmap0"
    transport:
      client: kubernetes
    manifest:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: "{{ .clusterId }}-config"
        namespace: "{{ .clusterId | lower }}"
        labels:
          hyperfleet.io/cluster-id: "{{ .clusterId }}"
        annotations:
          hyperfleet.io/generation: "{{ .generation }}"
      data:
        cluster_id: "{{ .clusterId }}"
        cluster_name: "{{ .clusterName }}"
    discovery:
      namespace: "{{ .clusterId | lower }}"
      by_name: "{{ .clusterId }}-config"

  # Resource 2: ConfigMap — extra configuration (for additional expression targets)
  - name: "configmap1"
    transport:
      client: kubernetes
    manifest:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: "{{ .clusterId }}-extra"
        namespace: "{{ .clusterId | lower }}"
        labels:
          hyperfleet.io/cluster-id: "{{ .clusterId }}"
        annotations:
          hyperfleet.io/generation: "{{ .generation }}"
      data:
        feature_flags: "ha-enabled,auto-scaling,monitoring"
        max_replicas: "10"
        endpoint: "https://{{ .clusterId }}.{{ .region }}.hyperfleet.io"
    discovery:
      namespace: "{{ .clusterId | lower }}"
      by_name: "{{ .clusterId }}-extra"

# ===========================================================================
# Post-processing — Payload build with CEL expression patterns
# ===========================================================================
post:
  payloads:
    - name: "statusPayload"
      build:
        adapter: "cel-showcase"
        conditions:
          # ---------------------------------------------------------
          # Pattern 9: has() + ternary — existence check with fallback
          # Checks if all expected resources were discovered.
          # ---------------------------------------------------------
          - type: "Applied"
            status:
              expression: |
                has(resources.namespace0) && has(resources.configmap0) && has(resources.configmap1)
                ? "True"
                : "False"
            reason:
              expression: |
                has(resources.namespace0) && has(resources.configmap0) && has(resources.configmap1)
                ? "AllResourcesApplied"
                : "ResourcesNotDiscovered"
            message:
              # Pattern 5 (payload): string concatenation with conditional parts
              expression: |
                has(resources.namespace0) && has(resources.configmap0) && has(resources.configmap1)
                ? "All resources applied: "
                  + resources.namespace0.metadata.name + ", "
                  + resources.configmap0.metadata.name + ", "
                  + resources.configmap1.metadata.name
                : "One or more resources not yet discovered"

          # ---------------------------------------------------------
          # Pattern 10: optional chaining ?.orValue() — safe navigation
          # Safely reads namespace phase even if fields are missing.
          # ---------------------------------------------------------
          - type: "Available"
            status:
              expression: |
                resources.?namespace0.?status.?phase.orValue("") == "Active"
                ? "True"
                : "False"
            reason:
              expression: |
                resources.?namespace0.?status.?phase.orValue("Pending")
            message:
              expression: |
                "Namespace phase: " + resources.?namespace0.?status.?phase.orValue("unknown")

          # ---------------------------------------------------------
          # Pattern 14: adapter.? — adapter execution metadata access
          # Accesses adapter execution status and error details.
          # ---------------------------------------------------------
          - type: "Health"
            status:
              expression: |
                adapter.?executionStatus.orValue("") == "success"
                  && !adapter.?resourcesSkipped.orValue(false)
                ? "True"
                : "False"
            reason:
              expression: |
                adapter.?executionStatus.orValue("") != "success"
                ? "ExecutionFailed:" + adapter.?executionError.?phase.orValue("unknown")
                : adapter.?resourcesSkipped.orValue(false)
                  ? "ResourcesSkipped"
                  : "Healthy"
            message:
              # Pattern 5 (payload): multi-part string building
              expression: |
                adapter.?executionStatus.orValue("") != "success"
                ? "Adapter failed at phase ["
                    + adapter.?executionError.?phase.orValue("unknown")
                    + "] step ["
                    + adapter.?executionError.?step.orValue("unknown")
                    + "]: "
                    + adapter.?executionError.?message.orValue(adapter.?errorMessage.orValue("no details"))
                : adapter.?resourcesSkipped.orValue(false)
                  ? "Resources skipped: " + adapter.?skipReason.orValue("unknown reason")
                  : "Adapter execution completed successfully"

          # Finalized: Deletion cleanup status — always False; this adapter has no deletion flow.
          - type: "Finalized"
            status: "False"
            reason: "NotDeleting"
            message: "No pending deletion for this adapter instance"

        # Pattern 15: Go template rendering in payload values
        observed_generation:
          expression: "generation"
        observed_time: "{{ now | date \"2006-01-02T15:04:05Z07:00\" }}"

        data:
          # ---------------------------------------------------------
          # Pattern 10 (payload): optional chaining for safe field access
          # ---------------------------------------------------------
          namespace:
            name:
              expression: |
                resources.?namespace0.?metadata.?name.orValue("")
            phase:
              expression: |
                resources.?namespace0.?status.?phase.orValue("")
            labels_json:
              # Pattern 13: toJson() — serialization of resource metadata
              expression: |
                has(resources.namespace0)
                ? toJson(resources.namespace0.metadata.labels)
                : "{}"

          configmap:
            name:
              expression: |
                resources.?configmap0.?metadata.?name.orValue("")
            cluster_id:
              # Pattern 12: dig() — safe deep traversal into nested structures
              expression: |
                dig(resources, "configmap0.data.cluster_id")
            cluster_name:
              # Pattern 12b: dig() — traversing into a nested path
              expression: |
                dig(resources, "configmap0.data.cluster_name")

          extra:
            feature_flags:
              expression: |
                resources.?configmap1.?data.?feature_flags.orValue("")
            max_replicas:
              expression: |
                resources.?configmap1.?data.?max_replicas.orValue("0")
            # Pattern 12c: dig() on secondary configmap
            endpoint:
              expression: |
                dig(resources, "configmap1.data.endpoint")

          # ---------------------------------------------------------
          # Pattern 16-20 (payload): ext.Lists functions via captured variables
          # Note: raw API fields (spec.*, status.*) are not in scope here —
          # reference the variables captured in the precondition phase instead.
          # ---------------------------------------------------------
          lists:
            unique_tags:
              # Pattern 16: distinct() — captured uniqueTags list as JSON
              expression: |
                toJson(uniqueTags)
            sorted_tags:
              # Pattern 17: sort() — captured sortedTags list as JSON
              expression: |
                toJson(sortedTags)
            first_pool:
              # Pattern 18: slice() — first element from captured firstNodePoolName
              expression: |
                firstNodePoolName[0]
            condition_summary:
              # Pattern 19: flatten() — captured conditionSummary flat list as JSON
              expression: |
                toJson(conditionSummary)
            pools_by_replicas:
              # Pattern 20: sortBy() — captured nodePoolsByReplicas list as JSON
              expression: |
                toJson(nodePoolsByReplicas)

          # ---------------------------------------------------------
          # Pattern 9 (payload): nested ternary chains — multi-level branching
          # ---------------------------------------------------------
          overall_status:
            expression: |
              has(resources.namespace0) && has(resources.configmap0) && has(resources.configmap1) ? (resources.?namespace0.?status.?phase.orValue("") == "Active" ? "Ready" : "Provisioning") : "Pending"

          # Pattern 15: Go template rendering for payload values
          cluster_url: "https://console.{{ .region }}.hyperfleet.io/clusters/{{ .clusterId }}"

          # ---------------------------------------------------------
          # Pattern 21: conditionStatus() — replaces double-filter
          # Before: conditions.filter(c, c.type == "Reconciled").size() > 0
          #           ? conditions.filter(c, c.type == "Reconciled")[0].status
          #           : "Unknown"
          # ---------------------------------------------------------
          reconciled_status:
            expression: |
              conditionStatus(conditions, "Reconciled")

          # ---------------------------------------------------------
          # Pattern 22: conditionAge() — elapsed seconds since transition
          # Before: (timestamp(now()) - timestamp(
          #   conditions.filter(c, c.type == "Reconciled")[0].last_transition_time
          # )).getSeconds()
          # ---------------------------------------------------------
          reconciled_age_seconds:
            expression: |
              conditionAge(conditions, "Reconciled")

          # ---------------------------------------------------------
          # Pattern 23: stableFor() — stability window check
          # Before: conditionStatus == "True" && conditionAge > 300
          # (as a single combined expression with all the filter chains)
          # ---------------------------------------------------------
          is_reconciled_stable:
            expression: |
              stableFor(conditions, "Reconciled", 60)

          # ---------------------------------------------------------
          # Pattern 24: triState() — replaces nested ternaries
          # Before: isReady ? "True" : (isFailed ? "False" : "Unknown")
          # ---------------------------------------------------------
          health_status:
            expression: |
              triState(
                conditionStatus(conditions, "Reconciled") == "True",
                conditionStatus(conditions, "Reconciled") == "False"
              )

  post_actions:
    - name: "updateStatus"
      when:
        expression: "!adapter.resourcesSkipped"
      api_call:
        method: "PUT"
        url: "/api/hyperfleet/v1/clusters/{{ .clusterId }}/statuses"
        body: "{{ .statusPayload }}"
